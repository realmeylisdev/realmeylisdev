name: 3D Contributions

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D Contributions
        id: gen3d
        # GitHub GraphQL rejects this account's contribution query with
        # RESOURCE_LIMITS_EXCEEDED (contributions span too many repos/orgs), so
        # the action crashes on a null user. Tolerate it so the daily run stays
        # green; the last-good SVGs already committed to the repo are kept.
        continue-on-error: true
        uses: yoshi389111/github-profile-3d-contrib@v0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push
        # Only commit when generation succeeded, so a failed run never produces
        # an empty commit or overwrites the existing SVGs.
        if: steps.gen3d.outcome == 'success'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m "Update 3D contributions" || exit 0
          git push
